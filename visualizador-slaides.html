<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Slides | Colégio Tancredo</title>
    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <!-- CSS externo -->
    <link rel="stylesheet" href="css/visualizador.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>
    <div class="toolbar">
        <button onclick="fechar()" class="close-btn"><i class="fas fa-times"></i> Fechar</button>
        <button onclick="prevPage()"><i class="fas fa-chevron-left"></i> Anterior</button>
        <span>Página <input type="number" id="page-num" value="1" min="1"> de <span id="page-count">?</span></span>
        <button onclick="nextPage()">Próximo <i class="fas fa-chevron-right"></i></button>
        <button onclick="zoomIn()"><i class="fas fa-search-plus"></i> +</button>
        <button onclick="zoomOut()"><i class="fas fa-search-minus"></i> -</button>
        <button id="play-pause-btn" onclick="toggleAutoPlay()"><i class="fas fa-play"></i> Automático</button>
        <span id="zoom-level">100%</span>
    </div>
    <div id="viewer">
        <div id="pdf-container"></div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        // Obter parâmetros da URL
        const urlParams = new URLSearchParams(window.location.search);
        const arquivo = urlParams.get('file');
        const pasta = urlParams.get('pasta') || 'slaides'; // padrão é 'slaides'

        if (!arquivo) {
            alert('Nenhum PDF especificado.');
            if (window.history.length > 1) window.close();
            else window.location.href = 'acervo.html';
        }

        const pdfPath = `${pasta}/${arquivo}`;
        let pdfDoc = null;
        let pageNum = 1;
        let pageCount = 0;
        let scale = 1.5; // será ajustado
        let autoPlayInterval = null;
        let autoPlayActive = false;

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('pdf-container');
        container.appendChild(canvas);

        // Carregar PDF
        pdfjsLib.getDocument(pdfPath).promise.then(pdf => {
            pdfDoc = pdf;
            pageCount = pdf.numPages;
            document.getElementById('page-count').textContent = pageCount;
            document.getElementById('page-num').max = pageCount;
            // Ajusta escala inicial e renderiza
            return ajustarEscalaInicial().then(() => renderPage(pageNum));
        }).catch(err => {
            document.getElementById('viewer').innerHTML = `<div class="loading">Erro ao carregar PDF: ${err.message}</div>`;
        });

        // Função para ajustar a escala baseada no tamanho do container
        function ajustarEscalaInicial() {
            return pdfDoc.getPage(1).then(page => {
                const viewport = page.getViewport({ scale: 1.0 });
                const containerWidth = container.clientWidth;
                const containerHeight = container.clientHeight;
                const scaleX = (containerWidth - 40) / viewport.width;
                const scaleY = (containerHeight - 40) / viewport.height;
                scale = Math.min(scaleX, scaleY, 3);
                if (scale < 0.3) scale = 0.3;
                document.getElementById('zoom-level').textContent = Math.round(scale * 100) + '%';
            });
        }

        function renderPage(num) {
            container.style.opacity = '0.5';
            pdfDoc.getPage(num).then(page => {
                const viewport = page.getViewport({ scale: scale });
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                return page.render({ canvasContext: ctx, viewport: viewport }).promise;
            }).then(() => {
                container.style.opacity = '1';
            });
            document.getElementById('page-num').value = num;
        }

        function prevPage() {
            if (pageNum <= 1) return;
            pageNum--;
            renderPage(pageNum);
        }

        function nextPage() {
            if (pageNum >= pageCount) return;
            pageNum++;
            renderPage(pageNum);
        }

        function zoomIn() {
            scale += 0.2;
            if (scale > 3) scale = 3;
            renderPage(pageNum);
            document.getElementById('zoom-level').textContent = Math.round(scale * 100) + '%';
        }

        function zoomOut() {
            if (scale <= 0.3) return;
            scale -= 0.2;
            if (scale < 0.3) scale = 0.3;
            renderPage(pageNum);
            document.getElementById('zoom-level').textContent = Math.round(scale * 100) + '%';
        }

        document.getElementById('page-num').addEventListener('change', function (e) {
            let newPage = parseInt(e.target.value);
            if (newPage >= 1 && newPage <= pageCount) {
                pageNum = newPage;
                renderPage(pageNum);
            } else {
                e.target.value = pageNum;
            }
        });

        function fechar() {
            window.close();
        }

        function toggleAutoPlay() {
            const btn = document.getElementById('play-pause-btn');
            if (autoPlayActive) {
                clearInterval(autoPlayInterval);
                autoPlayActive = false;
                btn.innerHTML = '<i class="fas fa-play"></i> Automático';
                btn.style.background = 'rgba(104, 129, 60, 0.6)';
            } else {
                if (pageNum >= pageCount) pageNum = 1;
                autoPlayInterval = setInterval(() => {
                    if (pageNum >= pageCount) {
                        toggleAutoPlay();
                        return;
                    }
                    pageNum++;
                    renderPage(pageNum);
                }, 3000);
                autoPlayActive = true;
                btn.innerHTML = '<i class="fas fa-pause"></i> Pausar';
                btn.style.background = 'rgba(220, 38, 38, 0.8)';
            }
        }

        window.addEventListener('resize', () => {
            if (pdfDoc) {
                ajustarEscalaInicial().then(() => renderPage(pageNum));
            }
        });
    </script>
</body>

</html>
