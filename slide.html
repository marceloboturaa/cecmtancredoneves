<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Apresentações – Exposição Escolar | Colégio Tancredo</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/slide.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
</head>

<body>
    <nav>
        <div class="logo"><a href="index.html">Colégio Tancredo</a></div>
        <div class="menu-toggle">☰</div> <!-- Já existente, evita duplicação -->
        <ul class="nav-links">
            <li><a href="index.html">Início</a></li>
            <li><a href="materias.html">Matérias</a></li>
            <li><a href="mural.html">Mural</a></li>
            <li><a href="slide.html">Slides</a></li>
            <li><a href="acervo.html">Acervo</a></li>
            <li><a href="sobre.html">Sobre</a></li>
        </ul>
    </nav>


    <header class="dark-bg" style="background:linear-gradient(135deg,var(--blue),#0f2a44);">
        <h1>Apresentações</h1>
        <p>Clique em cada card para visualizar os slides</p>
    </header>

    <section class="container">
        <div class="grid" id="pdf-list"></div>
    </section>

    <!-- RODAPÉ PADRONIZADO -->
    <footer id="rodape">
        <div class="container">
            <div class="footer-content">
                <div class="footer-bottom">
                    <span class="footer-copy">
                        © 2026 Colégio Tancredo Neves • <strong>Legado Digital:</strong> Exposição de Trabalhos Escolares
                    </span>
                    <a href="https://www.youtube.com/@sabormatematica" target="_blank" class="yt-link">
                        <span>@sabormatematica</span>
                    </a>
                </div>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        const slides = [
            { arquivo: "conhecimento-financeiro-otimizado.pdf", titulo: "Conhecimento Financeiro", descricao: "Slides sobre orçamento familiar, inflação e poupança." },
            { arquivo: "conhecimento-imprevisto-otimizado.pdf", titulo: "Conhecimento Imprevisto", descricao: "Preparação para emergências financeiras." },
            { arquivo: "defincoes-e-metas-otimizado.pdf", titulo: "Definições e Metas", descricao: "Estabelecendo objetivos financeiros." },
            { arquivo: "história-do-dinheiro-externo-otimizado.pdf", titulo: "História do Dinheiro", descricao: "Evolução do dinheiro e sistemas de troca." },
            { arquivo: "preparacao-para-imprevisto-otimizado.pdf", titulo: "Preparação para Imprevistos", descricao: "Como se planejar para o inesperado." },
            { arquivo: "Receitas-e-dispesas-otimizado.pdf", titulo: "Receitas e Despesas", descricao: "Gestão de entradas e saídas financeiras." }
        ];

        const container = document.getElementById('pdf-list');

        async function gerarThumbnail(pdfPath, index) {
            try {
                const pdf = await pdfjsLib.getDocument(pdfPath).promise;
                const page = await pdf.getPage(1);
                const scale = 0.8;
                const viewport = page.getViewport({ scale });
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                await page.render({ canvasContext: context, viewport: viewport }).promise;
                const thumbDiv = document.querySelector(`.pdf-card[data-index="${index}"] .pdf-thumb`);
                if (thumbDiv) {
                    thumbDiv.innerHTML = '';
                    thumbDiv.appendChild(canvas);
                }
            } catch (error) {
                console.error('Erro ao gerar thumbnail', pdfPath, error);
                const thumbDiv = document.querySelector(`.pdf-card[data-index="${index}"] .pdf-thumb`);
                if (thumbDiv) {
                    thumbDiv.innerHTML = '<div style="display: flex; align-items: center; justify-content: center; height: 100%; color: #888;">Sem prévia</div>';
                }
            }
        }

        slides.forEach((slide, idx) => {
            const card = document.createElement('div');
            card.className = 'pdf-card';
            card.setAttribute('data-index', idx);
            card.onclick = () => abrirVisualizador(slide.arquivo);

            card.innerHTML = `
                <div class="pdf-thumb"></div>
                <h3>${slide.titulo}</h3>
                <p>${slide.descricao}</p>
            `;
            container.appendChild(card);
        });

        slides.forEach((slide, idx) => {
            const pdfPath = `slide/${slide.arquivo}`;
            gerarThumbnail(pdfPath, idx);
        });

        function abrirVisualizador(arquivo) {
            window.open(`visualizador-slide.html?file=${encodeURIComponent(arquivo)}&pasta=slide`, '_blank');
        }
    </script>
</body>

</html>
